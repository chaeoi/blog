<footer class="footer">
    <span id="runtime_span"></span> |
    <span id="vercount_container">总访客数: <span id="busuanzi_value_site_uv"></span> | 总访问量: <span id="busuanzi_value_site_pv"></span></span>
    <br>
    <span>Copyright &copy; {{ site.Params.StartYear }}-{{ now.Year }} | <a href="{{ "" | absLangURL }}" style="border-bottom:1px solid">{{ site.Title }}</a></span>
    <script defer src="https://cn.vercount.one/js"></script>
    <script type="text/javascript">
        function show_runtime() {
            window.setTimeout("show_runtime()", 1000);
            var X = new Date("{{ site.Params.StartDate }}");
            var Y = new Date();
            var T = (Y.getTime() - X.getTime());
            var M = 24 * 60 * 60 * 1000;
            var a = T / M;
            var A = Math.floor(a);
            var b = (a - A) * 24;
            var B = Math.floor(b);
            var c = (b - B) * 60;
            var C = Math.floor((b - B) * 60);
            var D = Math.floor((c - C) * 60);
            document.getElementById("runtime_span").innerHTML =
                "网站已运行" + A + "天" + B + "小时" + C + "分" + D + "秒";
        }
        show_runtime();
    </script>
</footer>
