{{- if not (.Param "hideFooter") }}
<footer class="footer">
    {{- if not site.Params.footer.hideCopyright }}
    <span id="runtime_span"></span> 
    <script type="text/javascript">function show_runtime(){window.setTimeout("show_runtime()",1000);X=new Date({{ .Site.Params.StartDate }});Y=new Date();T=(Y.getTime()-X.getTime());M=24*60*60*1000;a=T/M;A=Math.floor(a);b=(a-A)*24;B=Math.floor(b);c=(b-B)*60;C=Math.floor((b-B)*60);D=Math.floor((c-C)*60);runtime_span.innerHTML="网站已运行"+A+"天"+B+"小时"+C+"分"+D+"秒"}show_runtime();</script>
    |
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <span id="busuanzi_container">
        总访客数: <span id="busuanzi_value_site_uv"></span>
        |
        总访问量: <span id="busuanzi_value_site_pv"></span>
    </span>
    <br>
    {{- if site.Copyright }}
    <span>{{ site.Copyright | markdownify }}</span>
    {{- else }}
    <span>
        Copyright
        &copy;
        {{ .Site.Params.StartYear }}-{{ now.Year }} 
		|
        <a href="{{ "" | absLangURL }}" style="border-bottom:1px solid">{{ .Site.Title }}
    </span>
    {{- end }}
    {{- end }}
</footer>
{{- end }}
