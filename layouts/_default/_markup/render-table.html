<div class="post-table-wrapper">
  <table>
    {{- with .THead }}
      <thead>
        {{- range . }}
          <tr>
            {{- range . }}
              <th
                {{- with .Alignment }}
                  {{- printf " style=%q" (printf "text-align: %s;" .) | safeHTMLAttr }}
                {{- end -}}>
                {{- .Text -}}
              </th>
            {{- end }}
          </tr>
        {{- end }}
      </thead>
    {{- end }}
    <tbody>
      {{- range .TBody }}
        <tr>
          {{- range . }}
            <td
              {{- with .Alignment }}
                {{- printf " style=%q" (printf "text-align: %s;" .) | safeHTMLAttr }}
              {{- end -}}>
              {{- .Text -}}
            </td>
          {{- end }}
        </tr>
      {{- end }}
    </tbody>
  </table>
</div>
